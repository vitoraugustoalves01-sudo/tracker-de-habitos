<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tracker">
<meta name="theme-color" content="#0d0d0d">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Habit Tracker</title>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0ece4;
    --text2: #888;
    --text3: #555;
    --accent: #2563eb;
    --accent-light: rgba(37,99,235,0.15);
    --success: #16a34a;
    --danger: #dc2626;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; overscroll-behavior: none; }

  /* LAYOUT */
  #app { display: flex; flex-direction: column; height: 100%; max-width: 480px; margin: 0 auto; }
  #header { padding: 16px 20px 8px; border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
  #header h1 { font-size: 17px; font-weight: 600; }
  #header .date { font-size: 12px; color: var(--text2); margin-top: 2px; }
  #content { flex: 1; overflow-y: auto; padding: 16px 20px 100px; }
  #bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--surface); border-top: 0.5px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom); }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 0; font-size: 11px; color: var(--text3); cursor: pointer; gap: 3px; border: none; background: none; }
  .nav-item.active { color: var(--accent); }
  .nav-item svg { width: 22px; height: 22px; }

  /* TABS */
  .tab { display: none; }
  .tab.active { display: block; }

  /* SECTIONS */
  .section { margin-bottom: 20px; }
  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--text2); margin-bottom: 8px; }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .field { display: flex; align-items: center; padding: 12px 14px; border-bottom: 0.5px solid var(--border); gap: 12px; }
  .field:last-child { border-bottom: none; }
  .field-label { font-size: 13px; color: var(--text2); flex: 0 0 100px; }
  .field input[type=number], .field input[type=text], .field input[type=date] {
    flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 15px; text-align: right; width: 100%;
  }
  .field input::placeholder { color: var(--text3); }
  .field textarea { flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 14px; resize: none; width: 100%; line-height: 1.5; }

  /* CHIPS */
  .chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 14px; }
  .chip { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 0.5px solid var(--border2); background: transparent; cursor: pointer; color: var(--text2); transition: all .15s; }
  .chip.on { background: var(--accent-light); border-color: var(--accent); color: var(--text); }
  .badge-weekly { font-size: 9px; color: var(--text3); margin-left: 4px; }

  /* EXERCISE */
  .exercise-item { padding: 12px 14px; border-bottom: 0.5px solid var(--border); }
  .exercise-item:last-child { border-bottom: none; }
  .exercise-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .exercise-type-select { background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-size: 14px; padding: 5px 8px; }
  .remove-btn { background: none; border: none; color: var(--text3); font-size: 20px; cursor: pointer; line-height: 1; padding: 0 4px; }
  .exercise-fields { display: flex; gap: 8px; align-items: center; }
  .exercise-fields input { flex: 1; background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 13px; padding: 7px 10px; }
  .add-ex-btn { display: flex; align-items: center; gap: 6px; padding: 12px 14px; font-size: 13px; color: var(--accent); background: none; border: none; cursor: pointer; width: 100%; }
  .muscle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding-top: 8px; }
  .muscle-label { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); cursor: pointer; }
  .muscle-label input { width: 13px; height: 13px; cursor: pointer; accent-color: var(--accent); }
  .pace-display { font-size: 12px; color: var(--text2); flex: 1; text-align: right; }
  .glute-label { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); padding-top: 8px; cursor: pointer; }
  .glute-label input { width: 14px; height: 14px; cursor: pointer; accent-color: var(--accent); }

  /* TEXTAREA BLOCK */
  .textarea-block { padding: 10px 14px; }
  .textarea-block label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 4px; }
  .textarea-block textarea { width: 100%; background: none; border: none; outline: none; color: var(--text); font-size: 14px; resize: none; line-height: 1.5; }
  .meal-obs { width: 100%; background: none; border: none; outline: none; color: var(--text3); font-size: 12px; padding: 2px 0 4px; display: block; }
  .meal-obs::placeholder { color: var(--text3); }

  /* READING SELECT */
  .reading-select { background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 14px; padding: 6px 8px; width: 100%; outline: none; }
  .reading-other { background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 14px; padding: 6px 8px; width: 100%; outline: none; margin-top: 6px; display: none; }

  /* SAVE BUTTON */
  #save-btn { width: 100%; background: var(--accent); border: none; border-radius: var(--radius); color: #fff; font-size: 15px; font-weight: 600; padding: 15px; cursor: pointer; margin-top: 4px; transition: opacity .15s; }
  #save-btn:disabled { opacity: .5; }
  #save-msg { font-size: 13px; text-align: center; margin-top: 8px; min-height: 20px; }
  #save-msg.ok { color: var(--success); }
  #save-msg.err { color: var(--danger); }

  /* HISTORY */
  .day-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
  .day-card-date { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
  .day-card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .day-stat { font-size: 12px; color: var(--text2); }
  .day-stat span { color: var(--text); font-weight: 500; }
  .badge { display: inline-flex; align-items: center; font-size: 11px; padding: 3px 8px; border-radius: 10px; margin: 2px; }
  .badge-blue { background: var(--accent-light); color: #60a5fa; }
  .badge-green { background: rgba(22,163,74,.15); color: #4ade80; }
  .badges-row { margin-top: 8px; }
  .empty-state { text-align: center; color: var(--text2); font-size: 14px; padding: 40px 0; }

  /* METRICS */
  .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .metric-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; text-align: center; }
  .metric-val { font-size: 26px; font-weight: 600; }
  .metric-lbl { font-size: 11px; color: var(--text2); margin-top: 3px; }

  /* STREAKS */
  .streak-rule { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 0.5px solid var(--border); }
  .streak-rule:last-child { border-bottom: none; }
  .streak-icon { font-size: 18px; line-height: 1; }
  .streak-count { font-size: 20px; font-weight: 600; min-width: 32px; }
  .streak-name { font-size: 13px; color: var(--text2); }

  /* SPINNER */
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.2); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ANALYSIS */
  .analysis-output { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px; font-size: 14px; line-height: 1.7; white-space: pre-wrap; color: var(--text); min-height: 80px; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1 id="header-title">Registro do dia</h1>
    <div class="date" id="header-date"></div>
  </div>

  <div id="content">

    <!-- TAB: REGISTRO -->
    <div class="tab active" id="tab-input">

      <div class="section">
        <div class="section-title">Data</div>
        <div class="card">
          <div class="field">
            <label class="field-label">Data</label>
            <input type="date" id="inp-date">
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Corpo</div>
        <div class="card">
          <div class="field"><label class="field-label">Sono (h)</label><input type="number" id="inp-sleep" step="0.5" min="0" max="24" placeholder="7.5"></div>
          <div class="field"><label class="field-label">Água (L)</label><input type="number" id="inp-water" step="0.5" min="0" placeholder="3.5"></div>
          <div class="field"><label class="field-label">Peso (kg)</label><input type="number" id="inp-weight" step="0.1" min="40" placeholder="86.0"><button id="btn-no-weight" onclick="toggleNoWeight()" style="background:none;border:0.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text2);font-size:11px;padding:4px 8px;cursor:pointer;white-space:nowrap;margin-left:4px">não me pesei</button></div>
          <div class="field"><label class="field-label">Gordura (%)</label><input type="number" id="inp-gordura" step="0.1" min="0" max="60" placeholder="15.0"></div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Exercícios</div>
        <div class="card">
          <div id="exercise-list"></div>
          <button class="add-ex-btn" onclick="addExercise()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Adicionar exercício
          </button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Alimentação</div>
        <div class="card">
          <div class="textarea-block">
            <label>Café da manhã</label>
            <textarea id="inp-breakfast" rows="2" placeholder="ex: 3 ovos mexidos, pão francês, Monster Zero"></textarea>
            <input type="text" id="inp-breakfast-obs" class="meal-obs" placeholder="observação (opcional)...">
          </div>
          <div style="border-top:0.5px solid var(--border)" class="textarea-block">
            <label>Almoço</label>
            <textarea id="inp-lunch" rows="2" placeholder="ex: marmita light, frango, legumes"></textarea>
            <input type="text" id="inp-lunch-obs" class="meal-obs" placeholder="observação (opcional)...">
          </div>
          <div style="border-top:0.5px solid var(--border)" class="textarea-block">
            <label>Pré-treino</label>
            <textarea id="inp-pretreino" rows="2" placeholder="ex: banana, whey, café"></textarea>
            <input type="text" id="inp-pretreino-obs" class="meal-obs" placeholder="observação (opcional)...">
          </div>
          <div style="border-top:0.5px solid var(--border)" class="textarea-block">
            <label>Jantar</label>
            <textarea id="inp-dinner" rows="2" placeholder="ex: 150g patinho, brócolis, mandioquinha"></textarea>
            <input type="text" id="inp-dinner-obs" class="meal-obs" placeholder="observação (opcional)...">
          </div>
          <div style="border-top:0.5px solid var(--border)" class="textarea-block">
            <label>Ceia</label>
            <textarea id="inp-ceia" rows="2" placeholder="ex: iogurte grego, castanhas"></textarea>
            <input type="text" id="inp-ceia-obs" class="meal-obs" placeholder="observação (opcional)...">
          </div>
          <div style="border-top:0.5px solid var(--border);padding:12px 14px">
            <label id="lbl-fds" style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text3);cursor:pointer">
              <input type="checkbox" id="chk-fds" style="width:15px;height:15px;cursor:pointer;accent-color:var(--accent)">
              FDS sem recompensa alimentar
            </label>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Suplementação</div>
        <div class="card">
          <div class="chips" id="supps-chips"></div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Leitura</div>
        <div class="card">
          <div class="field"><label class="field-label">Minutos</label><input type="number" id="inp-reading-min" min="0" placeholder="30"></div>
          <div class="field" style="flex-direction:column;align-items:flex-start;gap:6px">
            <label class="field-label">O que leu</label>
            <select id="inp-reading-select" class="reading-select">
              <option value="">— selecione —</option>
              <option>O Obstáculo é o Caminho — Ryan Holiday</option>
              <option>Meditações — Marco Aurélio</option>
              <option>Não me faça Pensar — Steve Krug</option>
              <option>O Poder do Hábito — Charles Duhigg</option>
              <option value="outro">Outro...</option>
            </select>
            <input type="text" id="inp-reading-other" class="reading-other" placeholder="título do livro...">
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Observações</div>
        <div class="card">
          <div class="textarea-block"><textarea id="inp-notes" rows="3" placeholder="qualquer coisa relevante do dia..."></textarea></div>
        </div>
      </div>

      <button id="save-btn" onclick="saveDay()">Salvar dia</button>
      <div id="save-msg"></div>
    </div>

    <!-- TAB: HISTÓRICO -->
    <div class="tab" id="tab-history">
      <div class="section" id="streaks-section">
        <div class="section-title">Regras Inegociáveis</div>
        <div class="card" id="streaks-list"><div class="empty-state" style="padding:20px 0">Carregando...</div></div>
      </div>
      <div class="metrics-grid" id="metrics-grid"></div>
      <div id="history-list"></div>
    </div>

  </div>

  <nav id="bottom-nav">
    <button class="nav-item active" onclick="showTab('input',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Registro
    </button>
    <button class="nav-item" onclick="showTab('history',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Histórico
    </button>
  </nav>
</div>

<script>
// ── CONFIG (injetado pelo GitHub Actions no build) ──
const SA_KEY = JSON.parse('__SA_KEY_JSON__');
const SHEET_ID = '__SHEET_ID__';
const SHEET_NAME = 'entries';

// ── ESTADO ──
const SUPPS = ['Whey','Creatina','ZMA','L-carnitina','Beta-alanina','Colágeno','Multivitamínico','Vitamina D3 50.000 UI'];
const EX_TYPES = ['Boxe','Corrida','Musculação','Funcional','Yoga','Outro'];
const MUSCLES = ['Bíceps','Tríceps','Costas','Peito','Abdômen','Perna','Ombro','Abdução de quadril'];
let state = { exercises: [], supps: {} };

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  setTodayDate();
  buildSupps();
  updateHeaderDate();

  // Dropdown de livros
  document.getElementById('inp-reading-select').addEventListener('change', function() {
    const other = document.getElementById('inp-reading-other');
    other.style.display = this.value === 'outro' ? 'block' : 'none';
    if (this.value !== 'outro') other.value = '';
  });

  // Destaque do checkbox FDS nos fins de semana
  const dow = new Date().getDay();
  if (dow === 0 || dow === 6) {
    document.getElementById('lbl-fds').style.color = 'var(--text)';
  }
});

function setTodayDate() {
  const d = new Date();
  const iso = d.toISOString().split('T')[0];
  document.getElementById('inp-date').value = iso;
}

function updateHeaderDate() {
  const d = new Date();
  document.getElementById('header-date').textContent = d.toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long' });
}

// ── SUPPS ──
function buildSupps() {
  const c = document.getElementById('supps-chips');
  SUPPS.forEach(s => {
    state.supps[s] = false;
    const el = document.createElement('button');
    el.className = 'chip';
    if (s === 'Vitamina D3 50.000 UI') {
      el.innerHTML = `Vitamina D3 50.000 UI<span class="badge-weekly">(semanal)</span>`;
    } else {
      el.textContent = s;
    }
    el.onclick = () => { state.supps[s] = !state.supps[s]; el.classList.toggle('on', state.supps[s]); };
    c.appendChild(el);
  });
}

// ── PACE ──
function calcPace(km, min) {
  const k = parseFloat(km), m = parseInt(min);
  if (!k || !m || k <= 0 || m <= 0) return '';
  const totalSec = Math.round((m * 60) / k);
  const mm = Math.floor(totalSec / 60);
  const ss = String(totalSec % 60).padStart(2, '0');
  return `${mm}:${ss}`;
}

// ── TOGGLE MÚSCULO ──
function toggleMuscle(i, muscle, checked) {
  const arr = state.exercises[i].muscles;
  if (checked && !arr.includes(muscle)) arr.push(muscle);
  if (!checked) state.exercises[i].muscles = arr.filter(m => m !== muscle);
}

// ── EXERCISES ──
function addExercise() {
  state.exercises.push({ type: 'Boxe', duration: '', detail: '', km: '', runMin: '', muscles: [], gluteAtivation: false });
  renderExercises();
}
function removeExercise(i) {
  state.exercises.splice(i, 1);
  renderExercises();
}
function renderExercises() {
  const c = document.getElementById('exercise-list');
  c.innerHTML = '';
  state.exercises.forEach((ex, i) => {
    const div = document.createElement('div');
    div.className = 'exercise-item';

    let html = `
      <div class="exercise-header">
        <select class="exercise-type-select" onchange="state.exercises[${i}].type=this.value;renderExercises()">
          ${EX_TYPES.map(t => `<option${t===ex.type?' selected':''}>${t}</option>`).join('')}
        </select>
        <button class="remove-btn" onclick="removeExercise(${i})">×</button>
      </div>`;

    if (ex.type === 'Corrida') {
      const pace = calcPace(ex.km, ex.runMin);
      html += `
        <div class="exercise-fields">
          <input type="number" placeholder="km" step="0.1" min="0" value="${ex.km}"
            onchange="state.exercises[${i}].km=this.value; const p=calcPace(state.exercises[${i}].km,state.exercises[${i}].runMin); this.closest('.exercise-item').querySelector('.pace-display').textContent=p?'Pace: '+p+'/km':'';"
            style="flex:0 0 80px">
          <input type="number" placeholder="min" min="0" value="${ex.runMin}"
            onchange="state.exercises[${i}].runMin=this.value; const p=calcPace(state.exercises[${i}].km,state.exercises[${i}].runMin); this.closest('.exercise-item').querySelector('.pace-display').textContent=p?'Pace: '+p+'/km':'';"
            style="flex:0 0 80px">
          <span class="pace-display">${pace ? 'Pace: '+pace+'/km' : ''}</span>
        </div>
        <label class="glute-label">
          <input type="checkbox" ${ex.gluteAtivation?'checked':''}
            onchange="state.exercises[${i}].gluteAtivation=this.checked">
          Ativação de glúteo
        </label>`;
    } else if (ex.type === 'Musculação') {
      const checkboxes = MUSCLES.map(m => `
        <label class="muscle-label">
          <input type="checkbox" value="${m}" ${ex.muscles.includes(m)?'checked':''}
            onchange="toggleMuscle(${i},'${m}',this.checked)">
          ${m}
        </label>`).join('');
      html += `<div class="muscle-grid">${checkboxes}</div>`;
    } else {
      html += `
        <div class="exercise-fields">
          <input type="number" placeholder="minutos" value="${ex.duration}"
            onchange="state.exercises[${i}].duration=this.value" style="flex:0 0 90px">
          <input type="text" placeholder="detalhes (ex: 6 rounds)" value="${ex.detail}"
            onchange="state.exercises[${i}].detail=this.value">
        </div>`;
    }

    div.innerHTML = html;
    c.appendChild(div);
  });
}

// ── MEAL VALUE (com observação) ──
function mealVal(mealId, obsId) {
  const meal = document.getElementById(mealId).value.trim();
  const obs  = document.getElementById(obsId).value.trim();
  if (!meal) return '';
  return obs ? `${meal} (${obs})` : meal;
}

// ── NAVIGATION ──
function showTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  const titles = { input:'Registro do dia', history:'Histórico' };
  document.getElementById('header-title').textContent = titles[name];
  if (name === 'history') loadHistory();
}

// ── GOOGLE SHEETS AUTH ──
async function getAccessToken() {
  const now = Math.floor(Date.now() / 1000);
  const header = btoa(JSON.stringify({ alg:'RS256', typ:'JWT' })).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const payload = btoa(JSON.stringify({
    iss: SA_KEY.client_email,
    scope: 'https://www.googleapis.com/auth/spreadsheets',
    aud: 'https://oauth2.googleapis.com/token',
    exp: now + 3600,
    iat: now
  })).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');

  const toSign = `${header}.${payload}`;
  const keyData = SA_KEY.private_key
    .replace('-----BEGIN PRIVATE KEY-----', '')
    .replace('-----END PRIVATE KEY-----', '')
    .replace(/\n/g, '');

  const binaryKey = Uint8Array.from(atob(keyData), c => c.charCodeAt(0));
  const cryptoKey = await crypto.subtle.importKey(
    'pkcs8', binaryKey.buffer,
    { name:'RSASSA-PKCS1-v1_5', hash:'SHA-256' },
    false, ['sign']
  );
  const sig = await crypto.subtle.sign('RSASSA-PKCS1-v1_5', cryptoKey, new TextEncoder().encode(toSign));
  const sigB64 = btoa(String.fromCharCode(...new Uint8Array(sig))).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const jwt = `${toSign}.${sigB64}`;

  const res = await fetch('https://oauth2.googleapis.com/token', {
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:`grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=${jwt}`
  });
  const data = await res.json();
  return data.access_token;
}

// ── SAVE ──
async function saveDay() {
  const date = document.getElementById('inp-date').value;
  if (!date) { showMsg('Coloca a data', 'err'); return; }

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Salvando...';

  // Serialização dos exercícios
  const exercisesStr = state.exercises.map(e => {
    if (e.type === 'Corrida') {
      const pace = calcPace(e.km, e.runMin);
      const parts = [e.runMin ? e.runMin+'min' : '', e.km ? e.km+'km' : '', pace ? 'Pace: '+pace : ''].filter(Boolean);
      const base = `Corrida(${parts.join(' - ')})`;
      return e.gluteAtivation ? base + ' (+ Ativação de glúteo)' : base;
    }
    if (e.type === 'Musculação') {
      return e.muscles.length ? `Musculação - ${e.muscles.join(', ')}` : 'Musculação';
    }
    return `${e.type}(${e.duration}min${e.detail?' - '+e.detail:''})`;
  }).join(' | ');

  // Leitura
  const readingSel = document.getElementById('inp-reading-select');
  const readingTitle = readingSel.value === 'outro'
    ? document.getElementById('inp-reading-other').value
    : readingSel.value;

  const entry = [
    date,                                                          // A: date
    document.getElementById('inp-sleep').value || '',             // B: sleep
    document.getElementById('inp-water').value || '',             // C: water
    document.getElementById('inp-weight').value || '',            // D: weight
    '',                                                            // E: (energia — retrocompat)
    '',                                                            // F: (humor — retrocompat)
    '',                                                            // G: (trabalho — retrocompat)
    exercisesStr,                                                  // H: exercises
    mealVal('inp-breakfast', 'inp-breakfast-obs'),                 // I: breakfast
    mealVal('inp-lunch',     'inp-lunch-obs'),                     // J: lunch
    mealVal('inp-dinner',    'inp-dinner-obs'),                    // K: dinner
    mealVal('inp-ceia',      'inp-ceia-obs'),                      // L: ceia (era snacks)
    Object.keys(state.supps).filter(k => state.supps[k]).join(', '), // M: supps
    document.getElementById('inp-reading-min').value || '',        // N: reading_min
    readingTitle,                                                  // O: reading_title
    document.getElementById('inp-notes').value,                   // P: notes
    new Date().toISOString(),                                      // Q: created_at
    document.getElementById('inp-gordura').value || '',           // R: gordura
    document.getElementById('chk-fds').checked ? 'sim' : '',      // S: fds_sem_recompensa
    mealVal('inp-pretreino', 'inp-pretreino-obs'),                 // T: pré-treino
  ];

  try {
    const token = await getAccessToken();
    const res = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}!A:T:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`,
      {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ values: [entry] })
      }
    );
    if (!res.ok) throw new Error(await res.text());
    showMsg('✓ Salvo no Google Sheets', 'ok');
    resetForm();
  } catch(e) {
    showMsg('Erro: ' + e.message, 'err');
  }

  btn.disabled = false;
  btn.textContent = 'Salvar dia';
}

function showMsg(text, type) {
  const el = document.getElementById('save-msg');
  el.textContent = text;
  el.className = type;
  setTimeout(() => el.textContent = '', 3000);
}

function resetForm() {
  state.exercises = [];
  renderExercises();
  Object.keys(state.supps).forEach(k => state.supps[k] = false);
  document.querySelectorAll('#supps-chips .chip').forEach(c => c.classList.remove('on'));
  [
    'inp-sleep','inp-water','inp-weight','inp-gordura',
    'inp-breakfast','inp-breakfast-obs',
    'inp-lunch','inp-lunch-obs',
    'inp-pretreino','inp-pretreino-obs',
    'inp-dinner','inp-dinner-obs',
    'inp-ceia','inp-ceia-obs',
    'inp-reading-min','inp-notes'
  ].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.value = ''; el.disabled = false; }
  });
  document.getElementById('inp-weight').placeholder = '86.0';
  document.getElementById('btn-no-weight').style.borderColor = '';
  document.getElementById('btn-no-weight').style.color = '';
  document.getElementById('inp-reading-select').value = '';
  document.getElementById('inp-reading-other').value = '';
  document.getElementById('inp-reading-other').style.display = 'none';
  document.getElementById('chk-fds').checked = false;
  setTodayDate();
}

// ── STREAKS ──
function calcStreaks(rows) {
  // rows[0] = mais recente. Cada row: índices 0..19 (A..T)
  function parseLocalDate(dateStr) {
    if (!dateStr) return null;
    const [y, mo, d] = dateStr.split('-').map(Number);
    return new Date(y, mo - 1, d);
  }

  function streak(ruleFn) {
    let count = 0;
    for (const row of rows) {
      const result = ruleFn(row);
      if (result === 'skip') continue;
      if (result === true) { count++; }
      else { break; }
    }
    return count;
  }

  return [
    {
      name: 'Peso registrado',
      count: streak(row => !!(row[3] && row[3].trim()))
    },
    {
      name: 'Vitamina D3 tomada',
      count: streak(row => {
        const s = row[12] || '';
        return s.includes('Vitamina D3');
      })
    },
    {
      name: 'Café da manhã feito',
      count: streak(row => !!(row[8] && row[8].trim()))
    },
    {
      name: 'Abdução de quadril (musculação)',
      count: streak(row => {
        const ex = row[7] || '';
        if (!ex.includes('Musculação')) return 'skip';
        return ex.includes('Abdução de quadril');
      })
    },
    {
      name: 'Ativação de glúteo (corrida)',
      count: streak(row => {
        const ex = row[7] || '';
        if (!ex.includes('Corrida')) return 'skip';
        return ex.includes('Ativação de glúteo');
      })
    },
    {
      name: 'FDS sem recompensa alimentar',
      count: streak(row => {
        const dt = parseLocalDate(row[0]);
        if (!dt) return 'skip';
        const dow = dt.getDay();
        if (dow !== 0 && dow !== 6) return 'skip';
        return (row[18] || '') === 'sim';
      })
    }
  ];
}

// ── HISTORY ──
async function loadHistory() {
  const list = document.getElementById('history-list');
  const grid = document.getElementById('metrics-grid');
  const streakEl = document.getElementById('streaks-list');
  list.innerHTML = '<div class="empty-state">Carregando...</div>';
  streakEl.innerHTML = '<div class="empty-state" style="padding:20px 0">Carregando...</div>';

  try {
    const token = await getAccessToken();
    const res = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}!A:T`,
      { headers: { 'Authorization': `Bearer ${token}` } }
    );
    const data = await res.json();
    const rows = (data.values || []).slice(1).reverse(); // pula header, mais recente primeiro

    if (rows.length === 0) {
      grid.innerHTML = '';
      streakEl.innerHTML = '<div class="empty-state" style="padding:20px 0">Nenhum registro ainda.</div>';
      list.innerHTML = '<div class="empty-state">Nenhum registro ainda.</div>';
      return;
    }

    // Streaks
    const streaks = calcStreaks(rows);
    streakEl.innerHTML = streaks.map(s => `
      <div class="streak-rule">
        <span class="streak-icon">${s.count > 0 ? '🔥' : '💤'}</span>
        <span class="streak-count">${s.count}</span>
        <span class="streak-name">${s.name}</span>
      </div>`).join('');

    // Métricas
    const nums = (col) => rows.map(r => parseFloat(r[col])).filter(x => !isNaN(x));
    const avg = (arr) => arr.length ? (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1) : '-';
    const exCount = rows.filter(r => r[7] && r[7].trim()).length;

    grid.innerHTML = `
      <div class="metric-card"><div class="metric-val">${avg(nums(1))}</div><div class="metric-lbl">sono médio (h)</div></div>
      <div class="metric-card"><div class="metric-val">${avg(nums(2))}</div><div class="metric-lbl">água média (L)</div></div>
      <div class="metric-card"><div class="metric-val">${avg(nums(3))}</div><div class="metric-lbl">peso médio (kg)</div></div>
      <div class="metric-card"><div class="metric-val">${exCount}</div><div class="metric-lbl">dias com treino</div></div>`;

    list.innerHTML = '';
    rows.slice(0,30).forEach(r => {
      const [date,,sleep,water,weight,,,,,exercises,breakfast,lunch,dinner,ceia,supps,readMin,,notes] = r;
      const div = document.createElement('div');
      div.className = 'day-card';
      div.innerHTML = `
        <div class="day-card-date">${r[0]}</div>
        <div class="day-card-grid">
          ${r[1] ? `<div class="day-stat">Sono <span>${r[1]}h</span></div>` : ''}
          ${r[2] ? `<div class="day-stat">Água <span>${r[2]}L</span></div>` : ''}
          ${r[3] ? `<div class="day-stat">Peso <span>${r[3]}kg</span></div>` : ''}
          ${r[17] ? `<div class="day-stat">Gordura <span>${r[17]}%</span></div>` : ''}
        </div>
        ${r[7] ? `<div style="font-size:12px;color:var(--text2);margin-top:6px">🏃 ${r[7]}</div>` : ''}
        <div class="badges-row">
          ${r[12] ? `<span class="badge badge-blue">${r[12].split(',').length} supls</span>` : ''}
          ${r[13] ? `<span class="badge badge-green">📖 ${r[13]}min</span>` : ''}
          ${r[18] === 'sim' ? `<span class="badge badge-green">🥗 FDS ok</span>` : ''}
        </div>
        ${r[15] ? `<div style="font-size:12px;color:var(--text2);margin-top:6px;font-style:italic">${r[15]}</div>` : ''}`;
      list.appendChild(div);
    });
  } catch(e) {
    list.innerHTML = `<div class="empty-state">Erro ao carregar: ${e.message}</div>`;
    streakEl.innerHTML = `<div class="empty-state" style="padding:20px 0">Erro ao carregar</div>`;
  }
}

// ── TOGGLE PESO ──
function toggleNoWeight() {
  const inp = document.getElementById('inp-weight');
  const btn = document.getElementById('btn-no-weight');
  const noWeight = inp.disabled;
  if (noWeight) {
    inp.disabled = false;
    inp.value = '';
    inp.placeholder = '86.0';
    btn.style.borderColor = '';
    btn.style.color = '';
    state.noWeight = false;
  } else {
    inp.disabled = true;
    inp.value = '';
    inp.placeholder = 'não pesado';
    btn.style.borderColor = 'var(--accent)';
    btn.style.color = 'var(--accent)';
    state.noWeight = true;
  }
}
